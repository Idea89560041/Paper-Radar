# Daily Medical Imaging AI Paper Radar configuration
# Use a 14-day search window plus data/sent_papers.json dedupe to reduce misses
# caused by delayed indexing in PubMed, Semantic Scholar, Crossref, and arXiv.

lookback_days: 14
state_path: data/sent_papers.json
openai_sleep_seconds: 0.5

site:
  title: "Medical Imaging Deep Learning Paper Radar"
  output_dir: site
  max_papers: 30

research_profile:
  name: "Medical Imaging Deep Learning - Brain & Neuroimage"

  queries:
    - "medical imaging deep learning neuroimaging brain"
    - "brain gut axis neuroimaging deep learning artificial intelligence"
    - "gut brain axis microbiome neuroimaging machine learning"
    - "microbiome neuroimaging Alzheimer dementia MRI machine learning"
    - "multi organ medical imaging diagnosis deep learning artificial intelligence"
    - "multi organ guided diagnosis multimodal medical imaging deep learning"
    - "Alzheimer disease diagnosis MRI PET deep learning"
    - "dementia mild cognitive impairment neuroimaging foundation model"
    - "brain MRI medical image synthesis diffusion model"
    - "neuroimage enhancement super resolution denoising deep learning"
    - "medical image synthesis enhancement brain MRI"
    - "multimodal brain MRI PET diagnosis artificial intelligence"
    - "foundation model medical imaging brain MRI"
    - "vision language model radiology neuroimaging"
    - "large multimodal model radiology brain imaging"
    - "generative AI neuroimaging synthesis"

  pubmed_queries:
    - '("brain-gut axis"[Title/Abstract] OR "gut-brain axis"[Title/Abstract] OR microbiome[Title/Abstract]) AND (neuroimaging[Title/Abstract] OR brain[Title/Abstract] OR MRI[Title/Abstract] OR fMRI[Title/Abstract] OR PET[Title/Abstract]) AND ("artificial intelligence"[Title/Abstract] OR "deep learning"[Title/Abstract] OR "machine learning"[Title/Abstract])'
    - '("Alzheimer Disease"[MeSH Terms] OR Alzheimer*[Title/Abstract] OR dementia[Title/Abstract] OR "mild cognitive impairment"[Title/Abstract] OR MCI[Title/Abstract]) AND (MRI[Title/Abstract] OR PET[Title/Abstract] OR amyloid[Title/Abstract] OR tau[Title/Abstract] OR neuroimaging[Title/Abstract] OR "brain imaging"[Title/Abstract]) AND ("deep learning"[Title/Abstract] OR "machine learning"[Title/Abstract] OR "artificial intelligence"[Title/Abstract] OR radiomics[Title/Abstract])'
    - '("medical image synthesis"[Title/Abstract] OR "image synthesis"[Title/Abstract] OR "image enhancement"[Title/Abstract] OR "super resolution"[Title/Abstract] OR super-resolution[Title/Abstract] OR denoising[Title/Abstract] OR "diffusion model"[Title/Abstract]) AND (brain[Title/Abstract] OR neuroimaging[Title/Abstract] OR MRI[Title/Abstract] OR fMRI[Title/Abstract] OR PET[Title/Abstract])'
    - '("multi-organ"[Title/Abstract] OR "multi organ"[Title/Abstract] OR multimodal[Title/Abstract]) AND ("medical imaging"[Title/Abstract] OR radiology[Title/Abstract]) AND (diagnosis[Title/Abstract] OR classification[Title/Abstract] OR prediction[Title/Abstract]) AND ("artificial intelligence"[Title/Abstract] OR "deep learning"[Title/Abstract] OR "machine learning"[Title/Abstract])'
    - '("foundation model"[Title/Abstract] OR "vision-language model"[Title/Abstract] OR "large multimodal model"[Title/Abstract] OR "large language model"[Title/Abstract]) AND ("medical imaging"[Title/Abstract] OR radiology[Title/Abstract] OR neuroimaging[Title/Abstract] OR brain[Title/Abstract])'

  arxiv_queries:
    - "brain neuroimaging medical imaging deep learning"
    - "Alzheimer MRI PET deep learning"
    - "brain MRI diffusion model synthesis"
    - "medical image enhancement neuroimaging deep learning"
    - "multi organ medical imaging diagnosis deep learning"
    - "foundation model medical imaging brain"
    - "vision language model radiology brain"
    - "large multimodal model medical imaging"
    - "MICCAI brain MRI diffusion model"

  semantic_scholar_queries:
    - "brain-gut axis neuroimaging artificial intelligence"
    - "gut microbiome neuroimaging Alzheimer's machine learning"
    - "microbiome MRI dementia neuroimaging deep learning"
    - "multi-organ guided diagnosis medical imaging AI"
    - "Alzheimer's disease diagnosis MRI PET deep learning"
    - "brain MRI medical image synthesis diffusion model"
    - "neuroimage enhancement super-resolution denoising"
    - "medical imaging foundation model brain MRI"
    - "vision-language model radiology neuroimaging"
    - "large multimodal model radiology medical imaging"
    - "MICCAI neuroimaging deep learning"
    - "Medical Image Analysis brain MRI artificial intelligence"

