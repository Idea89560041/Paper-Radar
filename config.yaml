# Daily Medical Imaging AI Paper Radar configuration
# Use a 14-day search window plus data/sent_papers.json dedupe to reduce misses
# caused by delayed indexing in PubMed, Semantic Scholar, Crossref, and arXiv.

lookback_days: 14
state_path: data/sent_papers.json
openai_sleep_seconds: 0.5

site:
  title: "Medical Imaging Deep Learning Paper Radar"
  output_dir: site
  max_papers: 30
  use_sent_state: true
  min_preprints: 6
  max_per_topic: 6
  max_per_source: 18
  max_per_venue_category: 12
  max_ai_summaries: 0

local_readings:
  enabled: true
  data_path: data/local_readings.json
  state_path: data/local_library_state.json
  assets_dir: data/reading_assets
  site_assets_dir: reading-assets
  max_home_items: 4

